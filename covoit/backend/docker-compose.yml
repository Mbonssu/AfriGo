# ============================================================================
# COVOIT — Docker Compose (développement)
# ============================================================================
# Usage:
#   docker compose up -d          → démarrer tout
#   docker compose logs -f        → voir les logs
#   docker compose down -v        → tout arrêter + supprimer volumes
# ============================================================================

services:

  # ── Infrastructure ─────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: covoit-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-covoit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-covoit_secret}
      POSTGRES_DB: ${POSTGRES_USER:-covoit}
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-covoit}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: covoit-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: covoit-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-covoit}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-covoit_secret}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Services applicatifs ───────────────────────────────────────────────────

  api-gateway:
    build: ./api-gateway
    container_name: covoit-gateway
    ports:
      - "8000:8000"
    environment:
      AUTH_SERVICE_URL: http://auth-service:8000
      USER_SERVICE_URL: http://user-service:8000
      TRIP_SERVICE_URL: http://trip-service:8000
      BOOKING_SERVICE_URL: http://booking-service:8000
      NOTIFICATION_SERVICE_URL: http://notification-service:8000
      CHAT_SERVICE_URL: http://chat-service:8000
      SUBSCRIPTION_SERVICE_URL: http://subscription-service:8000
      CAUTION_SERVICE_URL: http://caution-service:8000
      FORUM_SERVICE_URL: http://forum-service:8000
      TRACKING_SERVICE_URL: http://tracking-service:8000
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      auth-service:
        condition: service_started
      user-service:
        condition: service_started
      trip-service:
        condition: service_started
      booking-service:
        condition: service_started
      notification-service:
        condition: service_started
      chat-service:
        condition: service_started
      subscription-service:
        condition: service_started
      caution-service:
        condition: service_started
      forum-service:
        condition: service_started
      tracking-service:
        condition: service_started
    volumes:
      - ./api-gateway/app:/app/app

  auth-service:
    build: ./services/auth
    container_name: covoit-auth
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-covoit}:${POSTGRES_PASSWORD:-covoit_secret}@postgres:5432/auth_db
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/auth/app:/app/app

  user-service:
    build: ./services/user
    container_name: covoit-user
    ports:
      - "8002:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-covoit}:${POSTGRES_PASSWORD:-covoit_secret}@postgres:5432/user_db
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./services/user/app:/app/app

  trip-service:
    build: ./services/trip
    container_name: covoit-trip
    ports:
      - "8003:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-covoit}:${POSTGRES_PASSWORD:-covoit_secret}@postgres:5432/trip_db
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./services/trip/app:/app/app

  booking-service:
    build: ./services/booking
    container_name: covoit-booking
    ports:
      - "8004:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-covoit}:${POSTGRES_PASSWORD:-covoit_secret}@postgres:5432/booking_db
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./services/booking/app:/app/app

  notification-service:
    build: ./services/notification
    container_name: covoit-notification
    ports:
      - "8005:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-covoit}:${POSTGRES_PASSWORD:-covoit_secret}@postgres:5432/notification_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/notification/app:/app/app

  chat-service:
    build: ./services/chat
    container_name: covoit-chat
    ports:
      - "8007:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-covoit}:${POSTGRES_PASSWORD:-covoit_secret}@postgres:5432/chat_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/chat/app:/app/app

  subscription-service:
    build: ./services/subscription
    container_name: covoit-subscription
    ports:
      - "8008:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-covoit}:${POSTGRES_PASSWORD:-covoit_secret}@postgres:5432/subscription_db
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./services/subscription/app:/app/app

  caution-service:
    build: ./services/caution
    container_name: covoit-caution
    ports:
      - "8009:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-covoit}:${POSTGRES_PASSWORD:-covoit_secret}@postgres:5432/caution_db
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./services/caution/app:/app/app

  forum-service:
    build: ./services/forum
    container_name: covoit-forum
    ports:
      - "8010:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-covoit}:${POSTGRES_PASSWORD:-covoit_secret}@postgres:5432/forum_db
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./services/forum/app:/app/app

  tracking-service:
    build: ./services/tracking
    container_name: covoit-tracking
    ports:
      - "8011:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-covoit}:${POSTGRES_PASSWORD:-covoit_secret}@postgres:5432/tracking_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/tracking/app:/app/app

  # ── Payment Service (désactivé pour le moment) ────────────────────────────
  # Décommenter quand le service de paiement sera prêt :
  #
  # payment-service:
  #   build: ./services/payment
  #   container_name: covoit-payment
  #   ports:
  #     - "8006:8000"
  #   environment:
  #     DATABASE_URL: postgresql://${POSTGRES_USER:-covoit}:${POSTGRES_PASSWORD:-covoit_secret}@postgres:5432/payment_db
  #     SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
  #     MONETBIL_API_BASE_URL: ${MONETBIL_API_BASE_URL:-https://api.monetbil.com/payment/v1}
  #     MONETBIL_SERVICE_KEY: ${MONETBIL_SERVICE_KEY:-}
  #     MONETBIL_NOTIFY_URL: ${MONETBIL_NOTIFY_URL:-}
  #     MONETBIL_RETURN_URL: ${MONETBIL_RETURN_URL:-}
  #     MONETBIL_COUNTRY: ${MONETBIL_COUNTRY:-CM}
  #     MONETBIL_CURRENCY: ${MONETBIL_CURRENCY:-XAF}
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   volumes:
  #     - ./services/payment/app:/app/app

volumes:
  postgres-data:
  redis-data:
  rabbitmq-data:

networks:
  default:
    name: covoit-network
