name: covoit_237
description: AfriGo — Application de covoiturage intercités pour le Cameroun
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & fonts
  google_fonts: ^8.0.2
  flutter_svg: ^2.0.10+1

  # Navigation
  go_router: ^14.2.0

  # State management
  provider: ^6.1.2
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Networking
  dio: ^5.4.3+1
  pretty_dio_logger: ^1.3.1
  connectivity_plus: ^6.0.3

  # Stockage sécurisé
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.2.3

  # Internationalisation
  intl: ^0.20.2

  # Sérialisation JSON
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Utilitaires
  logger: ^2.3.0
  equatable: ^2.0.5
  image_picker: ^1.2.1
  path_provider: ^2.1.3
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0
  web_socket_channel: ^3.0.1
  geolocator: ^13.0.2
  url_launcher: ^6.3.1
  file_picker: ^8.0.0+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Code generation
  build_runner: ^2.4.11
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true

  # Uncomment once you add the font files in assets/fonts/
  # fonts:
  #   - family: Outfit
  #     fonts:
  #       - asset: assets/fonts/Outfit-Regular.ttf
  #         weight: 400
  #       - asset: assets/fonts/Outfit-Bold.ttf
  #         weight: 700
  #       - asset: assets/fonts/Outfit-ExtraBold.ttf
  #         weight: 800
